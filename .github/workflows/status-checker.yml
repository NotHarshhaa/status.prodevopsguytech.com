name: Status Page Updater

on:
  schedule:
    # Run 4 times daily: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  # Run when changes are pushed to the repository
  push:
    paths:
      - "scripts/**"
      - "pages/api/**"
      - "lib/services/**"
      - ".github/workflows/status-checker.yml"
  workflow_dispatch:
    inputs:
      message:
        description: "Message to commit"
        required: true
        default: "status: Update status data [skip ci]"
      branch:
        description: "Branch to commit to"
        required: true
        default: "master"
      force_check:
        description: "Force bypass cache for all checks"
        required: false
        default: false
      timeout_minutes:
        description: "Timeout for status checks (minutes)"
        required: false
        default: "10"
        type: choice
        options:
          - "5"
          - "10"
          - "15"
          - "20"

permissions:
  contents: write
  actions: read

jobs:
  check-status:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 3

      - name: Validate Node modules
        run: |
          if [ ! -d "node_modules" ]; then
            echo "Node modules not found after npm ci"
            exit 1
          fi
          echo "Node modules installed successfully"

      - name: Check script syntax
        run: |
          echo "Validating script syntax..."
          node -c scripts/check-status.js
          node -c scripts/analyze-status-data.js
          echo "All scripts have valid syntax"

      - name: Display environment info
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Working directory: $(pwd)"
          echo "Available scripts:"
          ls -la scripts/

      - name: Run status check with enhanced logging
        run: |
          echo "Starting status check at $(date)"
          echo "Force check: ${{ github.event.inputs.force_check || 'false' }}"
          echo "Timeout: ${{ github.event.inputs.timeout_minutes || '10' }} minutes"
          
          # Set environment variables for enhanced logging
          export NODE_ENV=production
          export LOG_LEVEL=info
          
          # Run the status check with timeout
          timeout ${{ github.event.inputs.timeout_minutes || '10' }}m node scripts/check-status.js || {
            echo "Status check timed out or failed"
            exit 1
          }
          
          echo "Status check completed at $(date)"
        continue-on-error: false
        id: status-check
        timeout-minutes: ${{ github.event.inputs.timeout_minutes || 10 }}

      - name: Verify status data file was created
        run: |
          if [ ! -f "public/status-data.json" ]; then
            echo "Error: status-data.json file was not created"
            exit 1
          fi
          
          # Validate JSON format
          if ! jq empty public/status-data.json 2>/dev/null; then
            echo "Error: status-data.json is not valid JSON"
            exit 1
          fi
          
          echo "Status data file exists and is valid JSON"
          echo "File size: $(du -h public/status-data.json | cut -f1)"
          echo "Last modified: $(stat -c %y public/status-data.json)"

      - name: Analyze status data
        run: |
          echo "Analyzing status data..."
          node scripts/analyze-status-data.js
        continue-on-error: true
        id: analysis

      - name: Check for significant changes
        id: changes
        run: |
          if [ ! -f "public/status-data.json" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Error: No status data file"
            exit 1
          fi
          
          # Check if file has meaningful changes (not just timestamps)
          if git diff --staged --quiet public/status-data.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in status data"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # Get some statistics about the changes
            TOTAL_SITES=$(jq '.metrics.totalSites // 0' public/status-data.json)
            OPERATIONAL=$(jq '.metrics.operationalPercentage // 0' public/status-data.json)
            ISSUES_COUNT=$(jq '.metrics.sitesWithIssues | length // 0' public/status-data.json)
            
            echo "total_sites=$TOTAL_SITES" >> $GITHUB_OUTPUT
            echo "operational_percentage=$OPERATIONAL" >> $GITHUB_OUTPUT
            echo "issues_count=$ISSUES_COUNT" >> $GITHUB_OUTPUT
            
            echo "Changes detected:"
            echo "- Total sites: $TOTAL_SITES"
            echo "- Operational: $OPERATIONAL%"
            echo "- Sites with issues: $ISSUES_COUNT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "Committing status data changes..."
          
          # Configure git
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Add the status data file
          git add public/status-data.json
          
          # Create detailed commit message
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S UTC")
          TOTAL_SITES="${{ steps.changes.outputs.total_sites }}"
          OPERATIONAL="${{ steps.changes.outputs.operational_percentage }}"
          ISSUES="${{ steps.changes.outputs.issues_count }}"
          
          COMMIT_MSG="${{ github.event.inputs.message || 'status: Update status data' }} (${TIMESTAMP}) [skip ci]"
          COMMIT_MSG="$COMMIT_MSG | Sites: $TOTAL_SITES | Operational: $OPERATIONAL% | Issues: $ISSUES"
          
          git commit -m "$COMMIT_MSG"
          
          # Push changes
          git push origin "${{ github.event.inputs.branch || 'master' }}"
          
          echo "Changes committed and pushed successfully"
        continue-on-error: false

      - name: Create summary
        if: always()
        run: |
          echo "## Status Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Force check**: ${{ github.event.inputs.force_check || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timeout**: ${{ github.event.inputs.timeout_minutes || '10' }} minutes" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "- **Changes detected**: Yes" >> $GITHUB_STEP_SUMMARY
            echo "- **Total sites**: ${{ steps.changes.outputs.total_sites }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Operational**: ${{ steps.changes.outputs.operational_percentage }}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Issues**: ${{ steps.changes.outputs.issues_count }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Changes detected**: No" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add workflow run URL
          echo "- **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ Status Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Logs**: Check the workflow logs for detailed error information" >> $GITHUB_STEP_SUMMARY
          
          # Exit with error code to ensure failure is properly reported
          exit 1

  cleanup:
    runs-on: ubuntu-latest
    needs: check-status
    if: always() && needs.check-status.result == 'success'
    
    steps:
      - name: Cleanup old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '.github/workflows/status-checker.yml',
              per_page: 50
            });
            
            // Keep only the last 10 successful runs
            const successfulRuns = runs.workflow_runs.filter(run => run.conclusion === 'success');
            const runsToDelete = successfulRuns.slice(10);
            
            for (const run of runsToDelete) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id
                });
                console.log(`Deleted workflow run: ${run.id}`);
              } catch (error) {
                console.log(`Failed to delete run ${run.id}: ${error.message}`);
              }
            }
            
            console.log(`Cleanup completed. Deleted ${runsToDelete.length} old runs.`);
